<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试时间格式</title>
</head>
<body>
    <h1>测试时间格式化</h1>
    <div id="output"></div>
    
    <script>
        function formatDateTime(timestamp) {
            if (!timestamp) return '--';
            
            try {
                const date = new Date(timestamp);
                
                // 检查日期是否有效
                if (isNaN(date.getTime())) {
                    console.warn('Invalid timestamp:', timestamp);
                    return '--';
                }
                
                return date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (error) {
                console.error('Error formatting timestamp:', timestamp, error);
                return '--';
            }
        }
        
        // 测试不同格式的时间戳
        const testCases = [
            '2024-01-15T10:30:00',           // ISO格式（无时区）
            '2024-01-15T10:30:00Z',          // ISO格式（UTC）
            '2024-01-15T10:30:00+08:00',     // ISO格式（带时区）
            '2024-01-15T10:30:00.123456',    // ISO格式（带微秒）
            1705294200000,                    // Unix时间戳（毫秒）
            null,                             // null值
            '',                               // 空字符串
            undefined                         // undefined
        ];
        
        const output = document.getElementById('output');
        let html = '<table border="1" style="border-collapse: collapse; margin: 20px;"><tr><th style="padding: 10px;">输入</th><th style="padding: 10px;">输出</th></tr>';
        
        testCases.forEach(testCase => {
            const result = formatDateTime(testCase);
            html += `<tr><td style="padding: 10px;">${JSON.stringify(testCase)}</td><td style="padding: 10px;">${result}</td></tr>`;
            console.log('Input:', testCase, '=> Output:', result);
        });
        
        html += '</table>';
        output.innerHTML = html;
        
        console.log('✅ 测试完成');
    </script>
</body>
</html>
