<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 多周期指标仪表盘</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <div class="header-left">
            <h1>🐶 旺财看盘</h1>
            <p class="subtitle">BTC 多周期指标仪表盘</p>
        </div>
        <div class="header-right">
            <div class="realtime-price-container">
                <span class="realtime-label">实时价格</span>
                <div id="realtimePrice" class="realtime-price">—</div>
            </div>
            <div class="refresh-info">
                <span class="refresh-indicator"></span>
                <span class="refresh-text">自动刷新 30s</span>
                <button id="manualRefreshBtn" class="refresh-btn" aria-label="手动刷新">⟳</button>
            </div>
        </div>
    </header>

    <!-- Update timestamp -->
    <div class="update-time">
        <span id="updateTime">加载中...</span>
    </div>

    <!-- Main dashboard grid - 4 cards -->
    <main class="dashboard-grid">
        <!-- Card 1: EMA Indicators -->
        <div class="card" id="emaCard">
            <div class="card-header">
                <h2 class="card-title">EMA 均线指标</h2>
            </div>
            <div class="card-body">
                <div id="emaCardContent" class="card-content">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Card 2: Bollinger Bands -->
        <div class="card" id="bollingerCard">
            <div class="card-header">
                <h2 class="card-title">布林带指标</h2>
            </div>
            <div class="card-body">
                <div id="bollingerCardContent" class="card-content">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Card 3: RSI Indicators -->
        <div class="card" id="rsiCard">
            <div class="card-header">
                <h2 class="card-title">RSI 指标</h2>
            </div>
            <div class="card-body">
                <div id="rsiCardContent" class="card-content">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Card 4: MACD Indicators -->
        <div class="card" id="macdCard">
            <div class="card-header">
                <h2 class="card-title">MACD 指标</h2>
            </div>
            <div class="card-body">
                <div id="macdCardContent" class="card-content">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Card 5: Fibonacci Levels -->
        <div class="card" id="fibonacciCard">
            <div class="card-header">
                <h2 class="card-title">斐波那契回调位</h2>
                <button id="fibEditBtn" class="edit-btn" aria-label="编辑参数">⚙️ 编辑</button>
            </div>
            <div class="card-body">
                <div id="fibonacciCardContent" class="card-content">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="dashboard-footer">
        <p>数据来源: FastAPI Backend + Binance API</p>
        <p>技术指标: EMA, Bollinger Bands, RSI, MACD</p>
    </footer>

    <!-- Error modal (hidden by default) -->
    <div id="errorModal" class="error-modal hidden">
        <div class="error-content">
            <div class="error-icon">⚠️</div>
            <h3 class="error-title">无法加载数据</h3>
            <p id="errorMessage" class="error-message"></p>
            <button id="errorRetryBtn" class="error-retry-btn">重试</button>
        </div>
    </div>

    <!-- Fibonacci Edit Modal -->
    <div id="fibEditModal" class="fib-modal hidden">
        <div class="fib-modal-content">
            <div class="fib-modal-header">
                <h3>编辑斐波那契参数</h3>
                <button id="fibCloseBtn" class="fib-close-btn">✕</button>
            </div>
            <div class="fib-modal-body">
                <!-- 月线 -->
                <div class="fib-timeframe-section">
                    <h4>月线 (1m)</h4>
                    <div class="fib-input-group">
                        <label>高点:</label>
                        <input type="number" id="fib_1m_high" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>低点:</label>
                        <input type="number" id="fib_1m_low" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>方向:</label>
                        <select id="fib_1m_direction">
                            <option value="up">上涨回调</option>
                            <option value="down">下跌反弹</option>
                        </select>
                    </div>
                </div>

                <!-- 周线 -->
                <div class="fib-timeframe-section">
                    <h4>周线 (1w)</h4>
                    <div class="fib-input-group">
                        <label>高点:</label>
                        <input type="number" id="fib_1w_high" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>低点:</label>
                        <input type="number" id="fib_1w_low" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>方向:</label>
                        <select id="fib_1w_direction">
                            <option value="up">上涨回调</option>
                            <option value="down">下跌反弹</option>
                        </select>
                    </div>
                </div>

                <!-- 日线 -->
                <div class="fib-timeframe-section">
                    <h4>日线 (1d)</h4>
                    <div class="fib-input-group">
                        <label>高点:</label>
                        <input type="number" id="fib_1d_high" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>低点:</label>
                        <input type="number" id="fib_1d_low" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>方向:</label>
                        <select id="fib_1d_direction">
                            <option value="up">上涨回调</option>
                            <option value="down">下跌反弹</option>
                        </select>
                    </div>
                </div>

                <!-- 4小时 -->
                <div class="fib-timeframe-section">
                    <h4>4小时 (4h)</h4>
                    <div class="fib-input-group">
                        <label>高点:</label>
                        <input type="number" id="fib_4h_high" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>低点:</label>
                        <input type="number" id="fib_4h_low" step="0.01" />
                    </div>
                    <div class="fib-input-group">
                        <label>方向:</label>
                        <select id="fib_4h_direction">
                            <option value="up">上涨回调</option>
                            <option value="down">下跌反弹</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="fib-modal-footer">
                <button id="fibCancelBtn" class="fib-cancel-btn">取消</button>
                <button id="fibConfirmBtn" class="fib-confirm-btn">确认</button>
            </div>
        </div>
    </div>

    <!-- JavaScript modules -->
    <script type="module" src="components/ValueFormatter.js"></script>
    <script type="module" src="components/DataFetcher.js"></script>
    <script type="module" src="components/SVGVisualizer.js"></script>
    <script type="module" src="components/CardRenderer.js"></script>
    <script type="module" src="components/DashboardController.js"></script>
    <script type="module">
        import { DashboardController } from './components/DashboardController.js';
        
        // Card 1: EMA Indicators
        const emaCardConfig = {
            containerId: 'emaCardContent',
            title: 'EMA 均线指标',
            indicators: [
                { key: 'ema7', label: 'EMA7', style: 'solid', markerShape: 'circle' },
                { key: 'ema25', label: 'EMA25', style: 'solid', markerShape: 'triangle' },
                { key: 'ema50', label: 'EMA50', style: 'solid', markerShape: 'square' }
            ],
            yAxisConfig: { type: 'auto', ticks: 6 },
            colorScheme: {
                positive: '#22c55e', negative: '#ef4444', neutral: '#8a8fa8',
                ema7: '#3b82f6', ema25: '#8b5cf6', ema50: '#06b6d4'
            },
            referenceLines: []
        };

        // Card 2: Bollinger Bands
        const bollingerCardConfig = {
            containerId: 'bollingerCardContent',
            title: '布林带指标',
            indicators: [
                { key: 'boll_up', label: '布林上轨', style: 'solid', markerShape: 'circle' },
                { key: 'boll_md', label: '布林中轨', style: 'solid', markerShape: 'triangle' },
                { key: 'boll_dn', label: '布林下轨', style: 'solid', markerShape: 'square' }
            ],
            yAxisConfig: { type: 'auto', ticks: 6 },
            colorScheme: {
                positive: '#22c55e', negative: '#ef4444', neutral: '#8a8fa8',
                bollUp: '#f87171', bollMd: '#fb923c', bollDn: '#fbbf24'
            },
            referenceLines: []
        };

        // Card 3: RSI Indicators
        const rsiCardConfig = {
            containerId: 'rsiCardContent',
            title: 'RSI 指标',
            indicators: [
                { key: 'rsi14', label: 'RSI(14)', style: 'solid', markerShape: 'circle' },
                { key: 'rsi6', label: 'RSI(6)', style: 'solid', markerShape: 'triangle' }
            ],
            yAxisConfig: { type: 'fixed', min: 0, max: 100, ticks: 6 },
            colorScheme: {
                positive: '#22c55e', negative: '#ef4444', neutral: '#8a8fa8',
                overbought: '#ef4444', oversold: '#22c55e'
            },
            referenceLines: [
                { value: 70, label: '70 (超买)' },
                { value: 30, label: '30 (超卖)' }
            ]
        };

        // Card 4: MACD Indicators
        const macdCardConfig = {
            containerId: 'macdCardContent',
            title: 'MACD 指标',
            indicators: [
                { key: 'dif', label: 'DIF', style: 'solid', markerShape: 'circle' },
                { key: 'dea', label: 'DEA', style: 'solid', markerShape: 'triangle' },
                { key: 'macd', label: 'MACD', style: 'solid', markerShape: 'square' }
            ],
            yAxisConfig: { type: 'auto', ticks: 6 },
            colorScheme: {
                positive: '#22c55e', negative: '#ef4444', neutral: '#8a8fa8'
            },
            referenceLines: [{ value: 0, label: '零轴' }]
        };

        // Card 5: Fibonacci Levels
        const fibonacciCardConfig = {
            containerId: 'fibonacciCardContent',
            title: '斐波那契回调位',
            indicators: [
                { key: 'fib_0.236', label: '23.6%', style: 'solid', markerShape: 'circle' },
                { key: 'fib_0.382', label: '38.2%', style: 'solid', markerShape: 'triangle' },
                { key: 'fib_0.5', label: '50%', style: 'solid', markerShape: 'square' },
                { key: 'fib_0.618', label: '61.8%', style: 'solid', markerShape: 'diamond' }
            ],
            yAxisConfig: { type: 'auto', ticks: 6 },
            colorScheme: {
                positive: '#22c55e', negative: '#ef4444', neutral: '#8a8fa8'
            },
            referenceLines: [],
            isFibonacci: true  // Special flag to identify Fibonacci card
        };
        
        // Initialize dashboard when DOM is ready
        document.addEventListener('DOMContentLoaded', async () => {
            const config = {
                apiBaseUrl: 'http://127.0.0.1:8000',
                refreshInterval: 30000, // 30 seconds
                timeframes: ['1m', '1w', '1d', '4h'],
                cards: [emaCardConfig, bollingerCardConfig, rsiCardConfig, macdCardConfig, fibonacciCardConfig]
            };
            
            try {
                const dashboard = new DashboardController(config);
                await dashboard.initialize();
                dashboard.startAutoRefresh();
                
                // Wire manual refresh button
                const refreshBtn = document.getElementById('manualRefreshBtn');
                if (refreshBtn) {
                    refreshBtn.addEventListener('click', async () => {
                        await dashboard.refresh();
                    });
                }
                
                // Wire error retry button
                const retryBtn = document.getElementById('errorRetryBtn');
                if (retryBtn) {
                    retryBtn.addEventListener('click', async () => {
                        document.getElementById('errorModal').classList.add('hidden');
                        await dashboard.refresh();
                    });
                }
                
                window.dashboardController = dashboard;
                console.log('仪表板初始化成功');
            } catch (error) {
                console.error('仪表板初始化失败:', error);
                document.getElementById('errorMessage').textContent = error.message;
                document.getElementById('errorModal').classList.remove('hidden');
            }
        });

        // ===========================
        // Fibonacci Modal Event Handlers
        // ===========================
        
        // Load Fibonacci parameters from localStorage
        function loadFibonacciParams() {
            const timeframes = ['1m', '1w', '1d', '4h'];
            const defaultParams = {
                '1m': { high: 70000, low: 60000, direction: 'up' },
                '1w': { high: 68000, low: 62000, direction: 'up' },
                '1d': { high: 67000, low: 63000, direction: 'up' },
                '4h': { high: 66000, low: 64000, direction: 'up' }
            };
            
            timeframes.forEach(tf => {
                const key = `fib_params_${tf}`;
                const stored = localStorage.getItem(key);
                const params = stored ? JSON.parse(stored) : defaultParams[tf];
                
                document.getElementById(`fib_${tf}_high`).value = params.high;
                document.getElementById(`fib_${tf}_low`).value = params.low;
                document.getElementById(`fib_${tf}_direction`).value = params.direction;
            });
        }
        
        // Save Fibonacci parameters to localStorage
        function saveFibonacciParams() {
            const timeframes = ['1m', '1w', '1d', '4h'];
            
            timeframes.forEach(tf => {
                const high = parseFloat(document.getElementById(`fib_${tf}_high`).value);
                const low = parseFloat(document.getElementById(`fib_${tf}_low`).value);
                const direction = document.getElementById(`fib_${tf}_direction`).value;
                
                const params = { high, low, direction };
                const key = `fib_params_${tf}`;
                localStorage.setItem(key, JSON.stringify(params));
            });
        }
        
        // Open modal
        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.getElementById('fibEditBtn');
            const modal = document.getElementById('fibEditModal');
            const closeBtn = document.getElementById('fibCloseBtn');
            const cancelBtn = document.getElementById('fibCancelBtn');
            const confirmBtn = document.getElementById('fibConfirmBtn');
            
            // Load initial parameters
            loadFibonacciParams();
            
            // Open modal
            editBtn.addEventListener('click', () => {
                loadFibonacciParams();
                modal.classList.remove('hidden');
            });
            
            // Close modal
            const closeModal = () => {
                modal.classList.add('hidden');
            };
            
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            
            // Confirm and save
            confirmBtn.addEventListener('click', () => {
                saveFibonacciParams();
                closeModal();
                
                // Trigger dashboard refresh to recalculate Fibonacci levels
                if (window.dashboardController) {
                    window.dashboardController.refresh();
                }
            });
            
            // Close modal when clicking outside
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
